{% extends "base.html" %}

{% block page_title %}Notes Importantes{% endblock %}

{% block content %}
<div class="dashboard-grid" id="dashboard">
    <div class="card" id="notes" style="grid-column: 1 / -1;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="margin: 0;">📝 Notes Récentes</h2>
            <button class="btn" onclick="openModal('noteModal')" style="padding: 0.5rem 1rem; font-size: 0.9rem; background-color: var(--secondary);"><i class="fas fa-plus"></i></button>
        </div>
        <div class="notes-grid" id="notesList">
            {% for note in notes %}
                <div class="note-card" style="background-color: {{ note.color }};" data-id="{{ note.id }}">
                    <div class="note-actions" style="position: absolute; top: 10px; right: 10px; display: flex; gap: 5px;">
                        <button class="btn" onclick="editNote({{ note.id }}, '{{ note.title|replace("'", "\\'") }}', '{{ note.content|replace("'", "\\'")|replace("\n", "\\n") }}', '{{ note.color }}')" style="padding: 2px 8px; font-size: 0.7rem; background-color: rgba(128,128,128,0.25);"><i class="fas fa-edit"></i></button>
                        <button class="btn" onclick="deleteNote({{ note.id }})" style="padding: 2px 8px; font-size: 0.7rem; background-color: rgba(128,128,128,0.25);"><i class="fas fa-trash"></i></button>
                    </div>
                    <h3 style="color: {{ note.color|text_color }};">{{ note.title }}</h3>
                    <p style="color: {{ note.color|text_color }}; opacity: 0.85;">{{ note.content }}</p>
                </div>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Modal Modifier Note -->
<div id="editNoteModal" class="modal">
    <div class="modal-content card">
        <span class="close-modal" onclick="closeModal('editNoteModal')">&times;</span>
        <h2>Modifier la Note</h2>
        <form id="editNoteForm">
            <input type="hidden" id="editNoteId">
            <div class="form-group">
                <label>Titre</label>
                <input type="text" id="editNoteTitle" required>
            </div>
            <div class="form-group">
                <label>Contenu</label>
                <textarea id="editNoteContent" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label>Couleur</label>
                <input type="color" id="editNoteColor">
            </div>
            <button type="submit" class="btn">Enregistrer les modifications</button>
        </form>
    </div>
</div>
{% endblock %}
