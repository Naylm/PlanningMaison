{% extends "base.html" %}

{% block page_title %}{% endblock %}

{% block content %}
<div class="dashboard-grid" id="dashboard">
    <div class="card" id="calendar-section" style="grid-column: 1 / -1;">
        <div id="calendar"></div>
    </div>
</div>

<!-- Modal Ajout Événement -->
<div id="eventModal" class="modal">
    <div class="modal-content card">
        <span class="close-modal" onclick="closeModal('eventModal')">&times;</span>
        <h2>Nouvel Événement</h2>
        <form id="addEventForm">
            <div class="form-group">
                <label>Titre de l'événement</label>
                <input type="text" id="eventTitle" required>
            </div>
            <div class="form-group">
                <label>Début</label>
                <input type="datetime-local" id="eventStart" required>
            </div>
            <div class="form-group">
                <label>Fin (Optionnel)</label>
                <input type="datetime-local" id="eventEnd">
            </div>
            <div class="form-group">
                <label>Participants</label>
                <div class="member-checkboxes" id="eventMemberChecks">
                    <label class="member-check-item member-check-all">
                        <input type="checkbox" id="eventMemberAll" checked onchange="toggleAllMembers('eventMemberChecks', this)">
                        <span class="member-check-avatar">🏡</span>
                        <span>Tous (familial)</span>
                    </label>
                    {% for member in members %}
                    <label class="member-check-item" style="--mc:{{ member.color }};">
                        <input type="checkbox" class="event-member-cb" value="{{ member.id }}" onchange="syncAllCheckbox('eventMemberChecks')">
                        <span class="member-check-avatar" style="background:{{ member.color }}">{{ member.avatar }}</span>
                        <span>{{ member.name }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            <button type="submit" class="btn" style="width:100%;justify-content:center;">Enregistrer au calendrier</button>
        </form>
    </div>
</div>
<!-- Modal Détails Événement -->
<div id="eventDetailModal" class="modal">
    <div class="modal-content card">
        <span class="close-modal" onclick="closeModal('eventDetailModal')">&times;</span>
        <h2 id="detailTitle">Détails de l'événement</h2>
        <div style="margin: 1.5rem 0;">
            <p><strong>� Participants :</strong> <span id="detailMember"></span></p>
        <div id="detailMembersAvatars" style="display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;"></div>
            <p><strong>⏰ Heure :</strong> <span id="detailTime"></span></p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background-color: var(--secondary); flex: 1;" id="editEventBtn">Modifier</button>
            <button class="btn" style="background-color: var(--danger); flex: 1;" id="deleteEventBtn">Supprimer</button>
            <button class="btn" style="flex: 1;" onclick="closeModal('eventDetailModal')">Fermer</button>
        </div>
    </div>
</div>

<!-- Modal Modification Événement -->
<div id="editEventModal" class="modal">
    <div class="modal-content card">
        <span class="close-modal" onclick="closeModal('editEventModal')">&times;</span>
        <h2>Modifier l'Événement</h2>
        <form id="editEventForm">
            <input type="hidden" id="editEventId">
            <div class="form-group">
                <label>Titre de l'événement</label>
                <input type="text" id="editEventTitle" required>
            </div>
            <div class="form-group">
                <label>Début</label>
                <input type="datetime-local" id="editEventStart" required>
            </div>
            <div class="form-group">
                <label>Fin (Optionnel)</label>
                <input type="datetime-local" id="editEventEnd">
            </div>
            <div class="form-group">
                <label>Participants</label>
                <div class="member-checkboxes" id="editEventMemberChecks">
                    <label class="member-check-item member-check-all">
                        <input type="checkbox" id="editEventMemberAll" checked onchange="toggleAllMembers('editEventMemberChecks', this)">
                        <span class="member-check-avatar">🏡</span>
                        <span>Tous (familial)</span>
                    </label>
                    {% for member in members %}
                    <label class="member-check-item" style="--mc:{{ member.color }};">
                        <input type="checkbox" class="event-member-cb" value="{{ member.id }}" onchange="syncAllCheckbox('editEventMemberChecks')">
                        <span class="member-check-avatar" style="background:{{ member.color }}">{{ member.avatar }}</span>
                        <span>{{ member.name }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            <button type="submit" class="btn" style="width:100%;justify-content:center;">Mettre à jour</button>
        </form>
    </div>
</div>
{% endblock %}
